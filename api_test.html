<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>낙찰 API 테스트 v2</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#0f0;font-size:13px">
<h2 style="color:#fff">낙찰정보 API 테스트 (문서 v1.1 기준)</h2>
<div id="log"></div>
<script>
var KEY = '5e28545eb4cc2148cc0a3dc9eb8d273018db18537aa28ed21e7983ed66363aef';
var start = '202606200000', end = '202607202359';
function log(msg, c) {
  var d = document.createElement('div');
  d.style.color = c || '#0f0'; d.style.marginBottom = '4px';
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  document.getElementById('log').appendChild(d);
}

// 문서 기준 엔드포인트 3개 동시 테스트
var endpoints = [
  'getScsbidListSttusThng',    // 물품
  'getScsbidListSttusCnstwk',  // 공사
  'getScsbidListSttusServc',   // 용역
];

// 문서 기준 파라미터: ServiceKey(대문자S), inqryDiv=1, YYYYMMDDHHMM
async function test(ep) {
  var qs = 'ServiceKey=' + KEY + '&pageNo=1&numOfRows=10&type=json&inqryDiv=1'
         + '&inqryBgnDt=' + start + '&inqryEndDt=' + end;
  var url = 'https://apis.data.go.kr/1230000/as/ScsbidInfoService/' + ep + '?' + qs;
  log('[' + ep + '] 직접호출 시도...');
  
  try {
    var res = await fetch(url, {signal: AbortSignal.timeout(10000)});
    var txt = await res.text();
    log('[' + ep + '] 직접: ' + txt.length + 'bytes → ' + txt.slice(0,80), txt.length > 100 ? '#0f0' : '#fa0');
  } catch(e) {
    log('[' + ep + '] 직접 ❌ ' + e.message, '#f44');
    
    // allorigins fallback
    try {
      var prx = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
      var r2 = await fetch(prx, {signal: AbortSignal.timeout(15000)});
      var t2 = await r2.text();
      log('[' + ep + '] allorigins: ' + t2.length + 'bytes → ' + t2.slice(0,80), t2.length > 100 ? '#0f0' : '#fa0');
    } catch(e2) {
      log('[' + ep + '] allorigins ❌ ' + e2.message, '#f44');
    }
  }
}

log('테스트 시작 | 기간: ' + start + ' ~ ' + end);
log('ServiceKey: ' + KEY.slice(0,20) + '...');
endpoints.forEach(function(ep) { test(ep); });
</script>
</body></html>
